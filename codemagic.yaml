# Surgerypro - Flutter Android Build with Gemini 3.1
workflows:
  surgerypro-build:
    name: Surgerypro Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - openai_credentials # Ensure this group exists in Codemagic UI
      flutter: stable
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Build Flutter APK
        script: |
          flutter build apk --release \
            --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/**/*.aab
      - "**/*.apk"
