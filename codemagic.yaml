workflows:
  surgerypro-build:
    name: Surgerypro Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - openai_credentials # This must match the Group Name you set in UI
      flutter: stable
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Build Flutter APK
        script: |
          flutter build apk --release --dart-define=OPENAI_API_KEY=$OPENAI_API_KEY
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
