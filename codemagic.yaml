workflows:
  surgerypro-build:
    name: Surgerypro Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - api_keys
      flutter: stable
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Regenerate android folder
        script: flutter create . --platforms android --org com.drvyasshashwat
      - name: Fix gradle conflict
        script: |
          rm -f $CM_BUILD_DIR/android/build.gradle
          rm -f $CM_BUILD_DIR/android/app/build.gradle
      - name: Build Flutter APK
        script: |
          flutter build apk --release --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY

