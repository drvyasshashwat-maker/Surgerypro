# Codemagic Configuration

# This file is used for configuring the Codemagic CI/CD for Flutter projects.

# Setting up environment variables
# Add your secret variables in the Codemagic dashboard.
# Go to "Settings" > "Environment variables" in Codemagic dashboard to add these variables as secrets:
# 1. OPENAI_API_KEY: Your OpenAI API Key

# Define the environment variables

env:
  OPENAI_API_KEY: $OPENAI_API_KEY

# Use the environment variable in your build command
# Updating the flutter build command to include the OPENAI_API_KEY
command:
  flutter build apk --dart-define=OPENAI_API_KEY=$OPENAI_API_KEY
