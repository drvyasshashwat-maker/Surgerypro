name: surgerypro
description: General Surgery Study App for MRCS, FRCS and NHS Clinical Practice
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_generative_ai: ^0.4.0
  file_picker: ^8.0.0
  syncfusion_flutter_pdf: ^21.1.35
  isar: 3.1.0+1
  isar_flutter_libs: 3.1.0+1
  path_provider: ^2.1.0
  workmanager: ^0.5.0
  shared_preferences: ^2.2.0
  flutter_local_notifications: ^17.0.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.0
  intl: ^0.19.0
  uuid: ^4.3.3
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  isar_generator: 3.1.0+1
  build_runner: any

flutter:
  uses-material-design: true
   
  assets:
    - assets/images/
